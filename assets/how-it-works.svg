<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,PingFang SC,sans-serif">
  <rect x="1" y="1" width="998" height="558" rx="18" fill="#F4F0E5" stroke="#E4E0D3"/>
  <text x="40" y="52" font-size="21" font-weight="700" fill="#1B1913">How Humaux Memory works</text>
  <text x="40" y="78" font-size="14" fill="#948C78">Connect once. Every agent shares one structured memory — and keeps getting better at knowing you.</text>

  <!-- Agents row -->
  <g font-size="13.5" font-weight="600" text-anchor="middle">
    <g>
      <rect x="90" y="112" width="150" height="42" rx="10" fill="#FCFBF7" stroke="#D6D0BF"/>
      <text x="165" y="138" fill="#1B1913">Claude Code</text>
    </g>
    <g>
      <rect x="272" y="112" width="150" height="42" rx="10" fill="#FCFBF7" stroke="#D6D0BF"/>
      <text x="347" y="138" fill="#1B1913">Cursor</text>
    </g>
    <g>
      <rect x="454" y="112" width="150" height="42" rx="10" fill="#FCFBF7" stroke="#D6D0BF"/>
      <text x="529" y="138" fill="#1B1913">Codex</text>
    </g>
    <g>
      <rect x="636" y="112" width="150" height="42" rx="10" fill="#FCFBF7" stroke="#D6D0BF"/>
      <text x="711" y="138" fill="#1B1913">Windsurf</text>
    </g>
    <text x="838" y="138" font-size="20" fill="#B4AC97" font-weight="400">···</text>
  </g>

  <!-- Converging lines to MCP -->
  <g stroke="#C9C2AE" stroke-width="1.6" fill="none">
    <path d="M165 154 C165 185, 500 175, 500 196"/>
    <path d="M347 154 C347 185, 500 178, 500 196"/>
    <path d="M529 154 C529 185, 500 178, 500 196"/>
    <path d="M711 154 C711 185, 500 175, 500 196"/>
  </g>

  <!-- MCP -->
  <g text-anchor="middle">
    <rect x="392" y="196" width="216" height="44" rx="22" fill="#1B1913"/>
    <text x="500" y="223" font-size="14" font-weight="600" fill="#F4F0E5">MCP · one connection</text>
  </g>
  <path d="M500 240 L500 274" stroke="#C9C2AE" stroke-width="1.6"/>
  <path d="M494 268 L500 278 L506 268 Z" fill="#C9C2AE"/>

  <!-- Humaux Memory core -->
  <rect x="70" y="286" width="860" height="196" rx="16" fill="#FBFAF4" stroke="#E4E0D3"/>
  <circle cx="97" cy="313" r="4.5" fill="#A83A2E"/>
  <text x="112" y="318" font-size="14.5" font-weight="700" fill="#1B1913">Humaux Memory</text>
  <text x="238" y="318" font-size="12.5" fill="#948C78">— it remembers decisions, not just chats</text>

  <!-- Cognitive pipeline -->
  <text x="97" y="352" font-size="11.5" font-weight="600" fill="#948C78" letter-spacing="0.06em">COGNITIVE PIPELINE</text>
  <g font-size="13" text-anchor="middle">
    <g><rect x="97" y="364" width="176" height="46" rx="10" fill="#FCFBF7" stroke="#D6D0BF"/>
      <text x="185" y="384" font-weight="600" fill="#1B1913">Extract</text><text x="185" y="401" font-size="11" fill="#948C78">L1 · atoms</text></g>
    <text x="285" y="392" font-size="15" fill="#B4AC97">→</text>
    <g><rect x="297" y="364" width="176" height="46" rx="10" fill="#FCFBF7" stroke="#D6D0BF"/>
      <text x="385" y="384" font-weight="600" fill="#1B1913">Connect</text><text x="385" y="401" font-size="11" fill="#948C78">L2 · scenarios</text></g>
    <text x="485" y="392" font-size="15" fill="#B4AC97">→</text>
    <g><rect x="497" y="364" width="176" height="46" rx="10" fill="#FCFBF7" stroke="#D6D0BF"/>
      <text x="585" y="384" font-weight="600" fill="#1B1913">Persona</text><text x="585" y="401" font-size="11" fill="#948C78">L3 · who you are</text></g>
    <text x="685" y="392" font-size="15" fill="#B4AC97">→</text>
    <g><rect x="697" y="364" width="176" height="46" rx="10" fill="#FCFBF7" stroke="#D6D0BF"/>
      <text x="785" y="384" font-weight="600" fill="#1B1913">Skills</text><text x="785" y="401" font-size="11" fill="#948C78">L4 · reusable</text></g>
  </g>

  <!-- Stores -->
  <g font-size="12.5" text-anchor="middle" font-weight="600">
    <g><rect x="97" y="428" width="242" height="38" rx="9" fill="#F4F0E5" stroke="#E4E0D3"/><text x="218" y="452" fill="#57513F">Knowledge graph</text></g>
    <g><rect x="379" y="428" width="242" height="38" rx="9" fill="#F4F0E5" stroke="#E4E0D3"/><text x="500" y="452" fill="#57513F">Code graph · saves tokens</text></g>
    <g><rect x="661" y="428" width="212" height="38" rx="9" fill="#F4F0E5" stroke="#E4E0D3"/><text x="767" y="452" fill="#57513F">Public commons</text></g>
  </g>

  <!-- Recall arrow -->
  <path d="M930 384 C972 384, 972 133, 800 133" fill="none" stroke="#A83A2E" stroke-width="1.6" stroke-dasharray="5 4"/>
  <path d="M808 127 L797 133 L808 139 Z" fill="#A83A2E"/>
  <text x="952" y="270" font-size="11.5" fill="#A83A2E" transform="rotate(90 952 270)" text-anchor="middle">recalled in every session</text>
</svg>
